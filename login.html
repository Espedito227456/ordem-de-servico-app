<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<main class="auth-wrapper">

  <section class="auth-card">

    <header>
      <h1>Login</h1>
      <p>Entre com sua conta</p>
    </header>

    <!-- FORM LOGIN -->
    <form id="formLogin">

      <div class="form-group">
        <label>Email</label>
        <input id="email" type="email" placeholder="Seu email" required>
      </div>

     <div class="form-group password-wrapper">
  <label>Senha</label>

  <div class="input-icon">
    <input id="senha" type="password" placeholder="Sua senha" required>
   <span id="toggleSenha" class="eye">
  <i id="eyeIcon" class="fa-solid fa-eye-slash"></i>
</span>
  </div>
</div>

      <div class="form-actions">
        <button class="btn btn-primary" type="submit">
          Entrar
        </button>
      </div>

    </form>

    <div class="auth-link">
      Não tem conta? <a href="cadastro.html">Cadastrar</a>
    </div>

  </section>

</main>

<!-- FIREBASE LOGIN -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAbWh3GANf73czwQiWny94LJYPqlodZjAg",
  authDomain: "ordem-servico-app-bb6a8.firebaseapp.com",
  projectId: "ordem-servico-app-bb6a8",
  storageBucket: "ordem-servico-app-bb6a8.firebasestorage.app",
  messagingSenderId: "652244504112",
  appId: "1:652244504112:web:d68e0de5cc78245f0be7f5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("formLogin").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  try {
    await signInWithEmailAndPassword(auth, email, senha);

    alert("Login realizado com sucesso!");
    window.location.href = "index.html";

  } catch (error) {
    alert("Erro: " + error.message);
  }
});


const senhaInput = document.getElementById("senha");
const toggleSenha = document.getElementById("toggleSenha");
const eyeIcon = document.getElementById("eyeIcon");

toggleSenha.addEventListener("click", () => {
  const escondida = senhaInput.type === "password";

  senhaInput.type = escondida ? "text" : "password";

  if (escondida) {
    eyeIcon.classList.remove("fa-eye-slash");
    eyeIcon.classList.add("fa-eye");
  } else {
    eyeIcon.classList.remove("fa-eye");
    eyeIcon.classList.add("fa-eye-slash");
  }
});








const botao = document.querySelector(".btn-primary");

document.getElementById("formLogin").addEventListener("submit", async (e) => {
  e.preventDefault();

  botao.innerText = "Entrando...";
  botao.disabled = true;

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  try {
    await signInWithEmailAndPassword(auth, email, senha);

    window.location.href = "index.html";

  } catch (error) {
    alert("Erro: " + error.message);
    botao.innerText = "Entrar";
    botao.disabled = false;
  }
});
</script>

</body>
</html>
