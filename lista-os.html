<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serviços</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-gray-100 text-gray-800">

<header class="bg-blue-600 text-white p-4 flex justify-between">
  <a href="index.html" class="text-white">
      <i class="fa fa-arrow-left"></i>
    </a>
  <h1 class="font-bold">Serviços</h1>
  <div></div>
</header>

<main class="p-4">

  <h2 class="font-semibold mb-4">Ordens de Serviço</h2>

  <ul id="listaOS" class="space-y-3"></ul>

  <p id="vazio" class="text-center text-gray-500 mt-6 hidden">
    Nenhuma ordem de serviço cadastrada.
  </p>

</main>

<footer class="text-center text-sm text-gray-500 p-4">
  <p>&copy; 2026 App OS</p>
</footer>

<!-- ================= FIREBASE + JS ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  getDoc,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";


import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import { query, where } 
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAbWh3GANf73czwQiWny94LJYPqlodZjAg",
  authDomain: "ordem-servico-app-bb6a8.firebaseapp.com",
  projectId: "ordem-servico-app-bb6a8",
  storageBucket: "ordem-servico-app-bb6a8.firebasestorage.app",
  messagingSenderId: "652244504112",
  appId: "1:652244504112:web:d68e0de5cc78245f0be7f5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;


console.log("🔥 Firebase OS conectado");

// ================= LISTAR OS =================
async function listarOS(user) {
  const lista = document.getElementById("listaOS");
  const vazio = document.getElementById("vazio");

  lista.innerHTML = "";

  const q = query(
  collection(db, "ordens"),
  where("uid", "==", user.uid)
);

const snapshot = await getDocs(q);

  if (snapshot.empty) {
    vazio.classList.remove("hidden");
    return;
  }

  vazio.classList.add("hidden");

  snapshot.forEach((docItem) => {

    const os = docItem.data();
    const id = docItem.id;
    
    let corStatus = "";

if (os.status === "aberta") {
  corStatus = "border-l-4 border-yellow-400";
}

if (os.status === "em_andamento") {
  corStatus = "border-l-4 border-blue-500";
}

if (os.status === "concluida") {
  corStatus = "border-l-4 border-green-500";
}

if (os.status === "cancelada") {
  corStatus = "border-l-4 border-red-500";
}

    const li = document.createElement("li");

    li.className = `
  bg-white p-3 rounded shadow flex justify-between items-center
  ${corStatus}
`;

    li.innerHTML = `
  <div>
    <strong><b>Assunto:</b> ${os.titulo || "Sem título"}</strong><br>

    <small><b>Cliente:</b> ${os.cliente || "Sem cliente"}</small><br>

    <small><b>Trabalho a fazer:</b> ${os.descricao || ""}</small><br>

    <small><b>Execução:</b> ${os.execucao || ""}</small><br>

    <small><b>R$:</b> ${os.valor || 0}</small><br>

    <small><b>Status:</b> ${os.status || "aberta"}</small><br>
    
      <!-- 👇 AQUI ENTRA A DATA -->
    <small>
      <b>Criada em:</b>
      ${os.createdAt?.toDate?.().toLocaleString() || "Sem data"}
    </small><br>
    
    <small>
  <b>Concluída em:</b>
  ${os.completedAt?.toDate?.().toLocaleString() || "—"}
</small>
  </div>

  <div class="flex flex-col gap-2">

    <!-- 🔥 BOTÃO CONCLUIR -->
 <button 
  onclick="mudarStatus('${id}', '${os.status}')"
  class="${corBotaoStatus(os.status)} text-white px-3 py-1 rounded-lg text-sm shadow active:scale-95 transition">

  ${os.status === "aberta" ? "Aberta" :
    os.status === "em_andamento" ? "Em-andamento" :
    "Concluida"}
</button>

    <!-- ❌ BOTÃO EXCLUIR -->
    <button onclick="deletarOS('${id}')" 
      class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg text-sm shadow">
      Excluir
    </button>
    
    
    <button onclick="window.location.href='nova-os.html?id=${id}'" 
  class="bg-gray-500 hover:bg-gray-600 text-white px-3 py-1 rounded-lg text-sm shadow">
  Editar
</button>

  </div>
`;

    lista.appendChild(li);
  });
}

// inicia
onAuthStateChanged(auth, (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }
  
  currentUser = user;

  listarOS(user);
});

// =================FUNCAO MUDAR STATUS ================

async function mudarStatus(id, statusAtual) {

  let novoStatus = "";
  let updateData = {
    status: ""
  };

  if (statusAtual === "aberta") {
    novoStatus = "em_andamento";
  } 
  else if (statusAtual === "em_andamento") {
    novoStatus = "concluida";

    // 🔥 aqui salva data de conclusão
    updateData.completedAt = new Date();

  } 
  else {
    novoStatus = "aberta";

    // opcional: se reabrir, pode limpar conclusão
    updateData.completedAt = null;
  }

  updateData.status = novoStatus;

  await updateDoc(doc(db, "ordens", id), updateData);

  listarOS(currentUser);
}

window.mudarStatus = mudarStatus;

// =================FUNCAO MUDAR COR DO BOTAO================


function corBotaoStatus(status) {

  if (status === "aberta") {
    return "bg-yellow-500 hover:bg-yellow-600";
  }

  if (status === "em_andamento") {
    return "bg-blue-500 hover:bg-blue-600";
  }

  if (status === "concluida") {
    return "bg-green-500 hover:bg-green-600";
  }

  return "bg-gray-500 hover:bg-gray-600";
}


// =================FUNCAO EXCLUIR LISTA================

async function deletarOS(id) {

  if (!confirm("Deseja excluir esta OS?")) return;

  await deleteDoc(doc(db, "ordens", id));
  listarOS(currentUser); // ⚠️ precisa do user também (já já explico)
}

window.deletarOS = deletarOS;

</script>

</body>
</html>
